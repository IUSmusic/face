<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>face</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --c: #ffffff;
  --dim: rgba(0,229,204,0.12);
  --bg: #000000;
}

body {
  background: var(--bg);
  color: var(--c);
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  overflow: hidden;
  user-select: none;
}

/* Grid background */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,204,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,204,0.025) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none;
}

/* Scanlines */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px,
    transparent 1px, transparent 3px
  );
  pointer-events: none; z-index: 999;
}

.title {
  font-size: 9px;
  letter-spacing: 5px;
  text-transform: uppercase;
  opacity: 0.35;
}

/* ─── Face container ─── */
.face-wrap {
  position: relative;
  width: 340px; height: 380px;
  display: flex; align-items: center; justify-content: center;
}

.ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(0,229,204,0.18);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  animation: rpulse 4s ease-in-out infinite;
}
@keyframes rpulse {
  0%,100% { opacity:.18; transform:translate(-50%,-50%) scale(1); }
  50% { opacity:.4; transform:translate(-50%,-50%) scale(1.025); }
}

/* Corner brackets */
.fc { position:absolute; width:18px; height:18px; border-color:var(--c); border-style:solid; opacity:.5; }
.fc.tl { top:8px; left:8px; border-width:1.5px 0 0 1.5px; }
.fc.tr { top:8px; right:8px; border-width:1.5px 1.5px 0 0; }
.fc.bl { bottom:8px; left:8px; border-width:0 0 1.5px 1.5px; }
.fc.br { bottom:8px; right:8px; border-width:0 1.5px 1.5px 0; }

/* ─── Transcript ─── */
.transcript {
  font-size: 11px;
  letter-spacing: 2px;
  min-height: 16px;
  opacity: .75;
  text-transform: uppercase;
  max-width: 340px;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ─── Volume bar ─── */
.vol-wrap {
  width: 340px; height: 2px;
  background: rgba(0,229,204,0.08);
  overflow: hidden;
}
.vol-fill {
  height: 100%;
  width: 0%;
  background: var(--c);
  box-shadow: 0 0 8px rgba(0,229,204,0.6);
  transition: width 0.04s linear;
}

/* ─── Status ─── */
.status {
  font-size: 8.5px;
  letter-spacing: 3px;
  text-transform: uppercase;
  opacity: .35;
}

/* ─── Expression grid ─── */
.expr-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 5px;
  width: 340px;
}

.ebtn {
  background: transparent;
  border: 1px solid rgba(0,229,204,0.22);
  color: var(--c);
  padding: 7px 4px;
  font-family: 'Space Mono', monospace;
  font-size: 8.5px; letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  opacity: .6;
  transition: all .18s ease;
}
.ebtn:hover { background: var(--dim); border-color: var(--c); opacity:1; }
.ebtn.on {
  background: rgba(0,229,204,0.1);
  border-color: var(--c);
  box-shadow: 0 0 10px rgba(0,229,204,0.35), inset 0 0 6px rgba(0,229,204,0.05);
  opacity: 1;
}

/* ─── Mic button ─── */
.mic-btn {
  background: transparent;
  border: 1px solid rgba(0,229,204,0.38);
  color: var(--c);
  padding: 9px 26px;
  font-family: 'Space Mono', monospace;
  font-size: 9.5px; letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .25s ease;
}
.mic-btn:hover { background: var(--dim); box-shadow: 0 0 12px rgba(0,229,204,0.3); }
.mic-btn.live {
  border-color: #00000;
  color: #7a0000;
  animation: mbpulse 1.4s ease-in-out infinite;
}
@keyframes mbpulse {
  0%,100% { box-shadow: 0 0 6px rgba(255,68,85,.3); }
  50% { box-shadow: 0 0 18px rgba(255,68,85,.65); }
}

/* ─── Info panel ─── */
.info {
  font-size: 7.5px; letter-spacing: 1px;
  opacity: .25; text-align: center; line-height: 1.7;
  max-width: 340px;
}
</style>
</head>
<body>

<div class="title">Face Demo</div>

<div class="face-wrap">
  <div class="ring" style="width:310px;height:310px;"></div>
  <div class="ring" style="width:350px;height:350px;animation-delay:-2s;opacity:0.1"></div>
  <div class="fc tl"></div><div class="fc tr"></div>
  <div class="fc bl"></div><div class="fc br"></div>

  <svg id="face" viewBox="0 0 340 380" width="340" height="380" style="position:relative;z-index:2">
    <defs>
      <!-- Glow filters -->
      <filter id="gsm" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glg" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <!-- Face gradient -->
      <radialGradient id="fg" cx="50%" cy="36%" r="65%">
        <stop offset="0%"   stop-color="#0e2030"/>
        <stop offset="60%"  stop-color="#071018"/>
        <stop offset="100%" stop-color="#030509"/>
      </radialGradient>
      <!-- Pupil gradient -->
      <radialGradient id="pg" cx="32%" cy="32%" r="65%">
        <stop offset="0%"  stop-color="#ffffff"/>
        <stop offset="50%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#8a0000"/>
      </radialGradient>
      <!-- Iris ring gradient -->
      <radialGradient id="irg" cx="50%" cy="50%">
        <stop offset="70%" stop-color="transparent"/>
        <stop offset="100%" stop-color="rgba(0,229,204,0.3)"/>
      </radialGradient>
    </defs>

    <!-- ── Face shape ── -->
    <ellipse cx="170" cy="200" rx="145" ry="145"
      fill="url(#fg)" stroke="#ffffff" stroke-width="1.2" filter="url(#gsm)"/>

    <!-- ── Left eye group ── -->
    <g id="elg" style="transform-origin:128px 180px">
      <ellipse cx="128" cy="180" rx="25" ry="20"
        fill="#071018" stroke="#ffffff" stroke-width="1" filter="url(#gsm)"/>
      <!-- iris ring -->
      <circle cx="128" cy="180" r="19" fill="url(#irg)" opacity="0.6"/>
      <!-- pupil -->
      <circle cx="128" cy="180" r="11" fill="url(#pg)" filter="url(#glg)"/>
      <!-- pupil depth -->
      <circle cx="128" cy="180" r="6" fill="#003830" opacity="0.7"/>
      <!-- Specular highlights -->
      <circle cx="122" cy="174" r="3.5" fill="rgba(255,255,255,0.65)"/>
      <circle cx="123" cy="175" r="1.3" fill="white"/>
      <circle cx="133" cy="185" r="1.2" fill="rgba(255,255,255,0.25)"/>
    </g>

    <!-- ── Right eye group ── -->
    <g id="erg" style="transform-origin:212px 180px">
      <ellipse cx="212" cy="180" rx="25" ry="20"
        fill="#071018" stroke="#ffffff" stroke-width="1" filter="url(#gsm)"/>
      <circle cx="212" cy="180" r="19" fill="url(#irg)" opacity="0.6"/>
      <circle cx="212" cy="180" r="11" fill="url(#pg)" filter="url(#glg)"/>
      <circle cx="212" cy="180" r="6" fill="#003830" opacity="0.7"/>
      <circle cx="206" cy="174" r="3.5" fill="rgba(255,255,255,0.65)"/>
      <circle cx="207" cy="175" r="1.3" fill="white"/>
      <circle cx="217" cy="185" r="1.2" fill="rgba(255,255,255,0.25)"/>
    </g>

    <!-- ── Eyebrows ── -->
    <path id="brl" stroke="#ffffff" stroke-width="3" fill="none"
      stroke-linecap="round" filter="url(#gsm)"/>
    <path id="brr" stroke="#ffffff" stroke-width="3" fill="none"
      stroke-linecap="round" filter="url(#gsm)"/>

    <!-- ── Nose ── -->
    <path d="M 170 207 L 162 230 Q 170 235 178 230"
      stroke="#ffffff" stroke-width="1.2" fill="##ffffff"
      stroke-linecap="round" opacity="0.45" filter="url(#gsm)"/>

    <!-- ── Mouth ── -->
    <path id="mouth" d=""
      stroke="#ffffff" stroke-width="1.8" fill="#ffffff"
      stroke-linecap="round" stroke-linejoin="round" filter="url(#gsm)"/>
    <!-- Mouth inner glow when open -->
    <path id="mouth-glow" d=""
      stroke="none" fill="rgba(0,229,204,0.06)" filter="url(#glg)"/>

    <!-- ── Subtle cheek blush ── -->
    <ellipse cx="100" cy="228" rx="22" ry="11" fill="rgba(0,229,204,0.03)"/>
    <ellipse cx="240" cy="228" rx="22" ry="11" fill="rgba(0,229,204,0.03)"/>

    <!-- ── Chin detail ── -->
    <line x1="158" y1="333" x2="182" y2="333"
      stroke="rgba(0,229,204,0.18)" stroke-width="1"/>
  </svg>
</div>

<div class="transcript" id="tr"></div>
<div class="vol-wrap"><div class="vol-fill" id="vol"></div></div>
<div class="status" id="st"> ONSTANDBY</div>

<div class="expr-grid" id="exprGrid">
  <button class="ebtn on" data-expr="neutral">Neutral</button>
  <button class="ebtn"    data-expr="happy">Happy</button>
  <button class="ebtn"    data-expr="sad">Sad</button>
  <button class="ebtn"    data-expr="angry">Angry</button>
  <button class="ebtn"    data-expr="surprised">Surprised</button>
  <button class="ebtn"    data-expr="thinking">Thinking</button>
</div>

<button class="mic-btn" id="micBtn">ACTIVATE MIC</button>

<div class="info">
  real-time mouth sync<br>
  Keywords auto-trigger expressions & Click buttons to override
</div>

<script>
// ══════════════════════════════════════════════════
// EXPRESSION DEFINITIONS
// browL/R = [x1,y1, cx,cy, x2,y2] quadratic bezier
// eyeRY   = base eye vertical radius (20 = neutral)
// smile   = mouth curve: + smile, - frown
// mwidth  = mouth half-width
// forceOpen = minimum mouth openness (0–1)
// ══════════════════════════════════════════════════
const EXPRS = {
  neutral:   {
    browL: [105,160, 128,153, 151,158],
    browR: [189,158, 212,153, 235,160],
    eyeRY: 20, smile: 0,   mwidth: 36, forceOpen: 0
  },
  happy: {
    browL: [105,154, 128,147, 151,152],
    browR: [189,152, 212,147, 235,154],
    eyeRY: 15, smile: 14,  mwidth: 44, forceOpen: 0
  },
  sad: {
    browL: [105,156, 125,163, 151,160],
    browR: [189,160, 215,163, 235,156],
    eyeRY: 18, smile: -11, mwidth: 34, forceOpen: 0
  },
  angry: {
    browL: [105,164, 128,158, 151,152],
    browR: [189,152, 212,158, 235,164],
    eyeRY: 16, smile: -8,  mwidth: 32, forceOpen: 0
  },
  surprised: {
    browL: [105,146, 128,138, 151,143],
    browR: [189,143, 212,138, 235,146],
    eyeRY: 26, smile: 0,   mwidth: 26, forceOpen: 0.62
  },
  thinking: {
    browL: [105,158, 128,153, 151,156],
    browR: [189,154, 215,147, 235,153],
    eyeRY: 18, smile: 4,   mwidth: 22, forceOpen: 0
  }
};

// ── Keyword → expression map ──────────────────────
const KWORDS = {
  happy:     ['happy','joy','joyful','wonderful','great','amazing','love','excellent','fantastic','yay','glad','excited','pleasure','delightful','awesome','hooray','beautiful','perfect','brilliant','thrilled;hello;nice;hey;wow;'],
  sad:       ['sad','sorry','unfortunate','unhappy','depressed','miss','lonely','grief','crying','tears','heartbroken','terrible','awful','horrible','disappointed','upset','miserable','regret;no;what;really'],
  angry:     ['angry','mad','furious','rage','hate','annoying','stupid','stop','wrong','outrage','irritating','frustrated','ridiculous','unacceptable','nonsense','terrible','absurd'],
  surprised: ['wow','whoa','really','seriously','unbelievable','incredible','unexpected','shocking','impossible','amazing','oh','what','omg','woah','suddenly','surprised'],
  thinking:  ['think','maybe','perhaps','wondering','curious','interesting','consider','hmm','question','analyze','ponder','suppose','could','would','might','possibly','probably','wonder']
};

// ══════════════════════════════════════════════════
// STATE interpolated each frame
// ══════════════════════════════════════════════════
function cloneExpr(e) {
  return {
    browL: [...e.browL], browR: [...e.browR],
    eyeRY: e.eyeRY, smile: e.smile,
    mwidth: e.mwidth, forceOpen: e.forceOpen
  };
}

let cur = cloneExpr(EXPRS.neutral);
let tgt = cloneExpr(EXPRS.neutral);

let openness   = 0;   // actual rendered mouth openness
let targetOpen = 0;   // driven by audio
let blinkT     = 0;
let isBlinking = false;
let exprTimer  = null;

// Audio / speech
let audioCtx, analyser, recognition;
let listening = false;

const lerp = (a,b,t) => a + (b-a)*t;

// ══════════════════════════════════════════════════
// MOUTH PATH
// cx=170, cy=270 (mouth centre)
// ══════════════════════════════════════════════════
function buildMouth(smile, hw, open) {
  const MX = 170, MY = 268;
  const lx = MX - hw, rx = MX + hw;

  // Corners lift for smile, drop for frown
  const cy = MY - smile * 0.55;
  const openPx = open * 24;

  // Top lip control (curves inward, + extra lift from openPx)
  const tc = cy - 5.5 - openPx * 0.22 + Math.abs(smile) * 0.08;
  // Bottom lip control (drops with openPx, tempered by smile)
  const bc = cy + 5.5 + openPx + smile * 0.45;

  return `M ${lx} ${cy} Q ${MX} ${tc} ${rx} ${cy} Q ${MX} ${bc} ${lx} ${cy} Z`;
}

// ══════════════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════════════
const EL = id => document.getElementById(id);
const el = EL('elg'), er = EL('erg');
const brl = EL('brl'), brr = EL('brr');
const mouthEl = EL('mouth'), mouthGlow = EL('mouth-glow');

function render() {
  const T = 0.072; // interpolation speed

  // Lerp all expression params
  cur.smile    = lerp(cur.smile,    tgt.smile,    T);
  cur.mwidth   = lerp(cur.mwidth,   tgt.mwidth,   T);
  cur.eyeRY    = lerp(cur.eyeRY,    tgt.eyeRY,    T);
  cur.forceOpen= lerp(cur.forceOpen,tgt.forceOpen, T);
  for (let i = 0; i < 6; i++) {
    cur.browL[i] = lerp(cur.browL[i], tgt.browL[i], T);
    cur.browR[i] = lerp(cur.browR[i], tgt.browR[i], T);
  }

  // Mouth openness: audio-driven but at least forceOpen
  openness = lerp(openness, Math.max(targetOpen, cur.forceOpen), 0.22);

  // ── Blink ──
  if (!isBlinking && Math.random() < 0.0042) {
    isBlinking = true; blinkT = 0;
  }
  let blink = 1;
  if (isBlinking) {
    blinkT += 0.13;
    blink = Math.max(0.04, 1 - Math.sin(blinkT * Math.PI));
    if (blinkT >= 1) { isBlinking = false; blinkT = 0; }
  }

  // Eye scale = expression eyeRY / 20 (base) × blink
  const eyeScale = (cur.eyeRY / 20) * blink;
  el.style.transform = `scaleY(${eyeScale})`;
  er.style.transform = `scaleY(${eyeScale})`;

// ── Eyebrows ──
const bl = cur.browL, br = cur.browR;
const browLift = 4; // small upward move

brl.setAttribute('d', `M ${bl[0]} ${bl[1]} Q ${bl[2]} ${bl[3]} ${bl[4]} ${bl[5]}`);
brr.setAttribute('d', `M ${br[0]} ${br[1]} Q ${br[2]} ${br[3]} ${br[4]} ${br[5]}`);

brl.setAttribute('transform', `translate(0, -${browLift})`);
brr.setAttribute('transform', `translate(0, -${browLift})`);

  // ── Mouth ──
  const mp = buildMouth(cur.smile, cur.mwidth, openness);
  mouthEl.setAttribute('d', mp);
  // Glow path (slightly larger) when open
  if (openness > 0.05) {
    mouthGlow.setAttribute('d', buildMouth(cur.smile, cur.mwidth * 1.08, openness * 1.1));
  } else {
    mouthGlow.setAttribute('d', '');
  }

  requestAnimationFrame(render);
}

// ══════════════════════════════════════════════════
// SET EXPRESSION
// ══════════════════════════════════════════════════
function setExpr(name, fromBtn) {
  const e = EXPRS[name];
  if (!e) return;
  tgt = cloneExpr(e);

  // Update button highlights
  document.querySelectorAll('.ebtn').forEach(b => {
    b.classList.toggle('on', b.dataset.expr === name);
  });

  EL('st').textContent = `◈ ${name.toUpperCase()} ◈`;
}

function setExprAuto(name) {
  // Triggered by speech recognition. auto-revert to neutral after 3.5s
  setExpr(name);
  clearTimeout(exprTimer);
  exprTimer = setTimeout(() => setExpr('neutral'), 3500);
}

// Button delegation
document.getElementById('exprGrid').addEventListener('click', e => {
  const btn = e.target.closest('.ebtn');
  if (btn) {
    clearTimeout(exprTimer);
    setExpr(btn.dataset.expr, true);
  }
});

// ══════════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════════
async function startAudio() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.5;

    audioCtx.createMediaStreamSource(stream).connect(analyser);

    const buf = new Uint8Array(analyser.fftSize);

    (function tick() {
      analyser.getByteTimeDomainData(buf);

      // RMS amplitude
      let sum = 0;
      for (let i = 0; i < buf.length; i++) {
        const v = (buf[i] - 128) / 128;
        sum += v * v;
      }
      const rms = Math.sqrt(sum / buf.length);

      targetOpen = Math.min(1, rms * 10);
      EL('vol').style.width = Math.min(100, rms * 1000) + '%';

      if (listening) requestAnimationFrame(tick);
    })();

    return true;
  } catch(err) {
    alert('Microphone access is required.\nPlease allow and try again.');
    return false;
  }
}

// ══════════════════════════════════════════════════
// SPEECH RECOGNITION
// ══════════════════════════════════════════════════
function startSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { console.warn('SpeechRecognition not available in this browser.'); return; }

  recognition = new SR();
  recognition.continuous   = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = evt => {
    const result = evt.results[evt.results.length - 1];
    const text   = result[0].transcript.trim();
    EL('tr').textContent = text.toUpperCase();

    if (result.isFinal) {
      const words = text.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/);
      for (const [expr, kws] of Object.entries(KWORDS)) {
        if (words.some(w => kws.includes(w))) {
          setExprAuto(expr);
          break;
        }
      }
    }
  };

  recognition.onerror = e => {
    if (e.error !== 'no-speech') console.warn('SR:', e.error);
  };

  // Auto-restart on end (browser sometimes stops it)
  recognition.onend = () => { if (listening) recognition.start(); };
  recognition.start();
}

// ══════════════════════════════════════════════════
// MIC
// ══════════════════════════════════════════════════
const micBtn = EL('micBtn');

micBtn.addEventListener('click', async () => {
  if (!listening) {
    const ok = await startAudio();
    if (!ok) return;

    listening = true;
    micBtn.textContent = 'DEACTIVATE MIC';
    micBtn.classList.add('live');
    EL('st').textContent = 'LISTENING';
    startSpeech();
  } else {
    listening = false;
    micBtn.textContent = 'ACTIVATE MIC';
    micBtn.classList.remove('live');
    EL('st').textContent = 'STANDBY';
    EL('tr').textContent = ' ';
    EL('vol').style.width = '0%';

    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    if (recognition) recognition.stop();

    targetOpen = 0;
  }
});

// ══════════════════════════════════════════════════
// START
// ══════════════════════════════════════════════════
render();
</script>
</body>
</html>
